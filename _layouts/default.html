<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header>
    <nav class="nav-container">
      <a href="{{ '/' | relative_url }}" class="site-title">Jacob Wisniewski</a>
      <button class="nav-toggle" aria-label="Toggle navigation" onclick="document.querySelector('.nav-links').classList.toggle('open')">&#9776;</button>
      <ul class="nav-links">
        <li><a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>Self-Assessment</a></li>
        <li><a href="{{ '/code-review' | relative_url }}" {% if page.url == '/code-review' %}class="active"{% endif %}>Code Review</a></li>
        <li><a href="{{ '/enhancement-one' | relative_url }}" {% if page.url == '/enhancement-one' %}class="active"{% endif %}>Software Design</a></li>
        <li><a href="{{ '/enhancement-two' | relative_url }}" {% if page.url == '/enhancement-two' %}class="active"{% endif %}>Algorithms</a></li>
        <li><a href="{{ '/enhancement-three' | relative_url }}" {% if page.url == '/enhancement-three' %}class="active"{% endif %}>Databases</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <div class="container">
      <h1 class="page-title">{{ page.title }}</h1>
      {{ content }}
    </div>
  </main>

  <footer>
    <div class="container">
      <p>&copy; 2026 Jacob Wisniewski &mdash; CS-499 Computer Science Capstone &mdash; Southern New Hampshire University</p>
    </div>
  </footer>
</body>
</html>
